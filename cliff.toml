# git-cliff configuration — https://git-cliff.org/docs/configuration
#
# Generates Keep a Changelog format from conventional commits.
# Internal/noise commits (docs, test, chore, ci, style, qa) are skipped.
#
# The HTML comments in group names (<!-- 0 -->) control section ordering:
# Added → Fixed → Performance → Changed → Reverted.
# These comments are stripped from the rendered output.
#
# This file produces RAW changelog output. AI summarization happens in CI
# via scripts/changelog-summarize.sh (GitHub Models API) or locally via
# an agent reading .agents/skills/changelog-writing/SKILL.md.
#
# Usage:
#   git-cliff                           # full history
#   git-cliff v1.0.0-alpha.3..HEAD      # specific range
#   git-cliff --unreleased              # unreleased only
#   git-cliff -o CHANGELOG.md           # write to file
#
# See also: justfile recipes changelog, changelog-range, changelog-preview

[changelog]
header = """# Changelog\n"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}](https://github.com/civictechdc/votecatcher/compare/{% if previous.version %}v{{ previous.version | trim_start_matches(pat="v") }}..v{{ version | trim_start_matches(pat="v") }}{% else %}v{{ version | trim_start_matches(pat="v") }}{% endif %}) - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased](https://github.com/civictechdc/votecatcher/compare/{% if previous.version %}v{{ previous.version | trim_start_matches(pat="v") }}..HEAD{% endif %})
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}\
{{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}\n
"""
trim = true
footer = """<!-- generated by git-cliff -->"""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false

# Parser rules — first match wins. Skipped types never appear in changelog.
# The skip=true entries filter out noise that would bloat the raw output.
# Even with skip, these commits are still in git history for reference.
commit_parsers = [
    { message = "^feat", group = "<!-- 0 -->Added" },
    { message = "^fix", group = "<!-- 1 -->Fixed" },
    { message = "^perf", group = "<!-- 2 -->Performance" },
    { message = "^refactor", group = "<!-- 3 -->Changed" },
    { message = "^doc", group = "<!-- 4 -->Documentation", skip = true },
    { message = "^style", skip = true },
    { message = "^test", skip = true },
    { message = "^chore", skip = true },
    { message = "^ci", skip = true },
    { message = "^revert", group = "<!-- 5 -->Reverted" },
    { message = "^qa", skip = true },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9].*"
sort_commits = "oldest"
