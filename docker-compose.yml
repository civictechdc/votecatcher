services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ENV=local
    env_file:
      - ./backend/.env.local
    volumes:
      - ./backend:/app
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend-svelt
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend-svelt:/app
      - /app/node_modules
    depends_on:
      - backend

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: votecatcher
      POSTGRES_PASSWORD: votecatcher_dev
      POSTGRES_DB: votecatcher
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
