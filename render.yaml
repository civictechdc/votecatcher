services:
  - type: web
    name: votecatcher-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile.prod
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: votecatcher-db
          property: connectionString
      - key: OCR_PROVIDER_NAME
        value: openai
      - key: OCR_PROVIDER_MODEL
        value: gpt-4o-mini
      - key: OCR_PROVIDER_API_KEY
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
    healthCheckPath: /health

  - type: web
    name: votecatcher-frontend
    runtime: docker
    rootDir: frontend
    dockerfilePath: ./Dockerfile.prod
    plan: starter
    envVars:
      - key: PUBLIC_API_URL
        sync: false
      - key: ORIGIN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: votecatcher-db
          property: connectionString
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: OCR_PROVIDER_NAME
        value: openai
      - key: OCR_PROVIDER_MODEL
        value: gpt-4o-mini
      - key: OCR_PROVIDER_API_KEY
        sync: false

databases:
  - name: votecatcher-db
    plan: starter
    postgresMajorVersion: 16
