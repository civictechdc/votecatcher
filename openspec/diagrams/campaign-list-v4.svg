<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="successGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="shadowLg" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="1200" height="650" fill="#f8fafc"/>

  <!-- Header -->
  <text x="600" y="28" text-anchor="middle" font-size="18" font-weight="600" fill="#1e293b">Campaign List - v4</text>
  <text x="600" y="46" text-anchor="middle" font-size="11" fill="#64748b">Simplified confidence badges, uniform region badges</text>

  <!-- Main Container -->
  <rect x="40" y="60" width="1120" height="530" rx="12" fill="white" filter="url(#shadowLg)"/>

  <!-- Clean Header -->
  <rect x="40" y="60" width="1120" height="52" rx="12" fill="#1e293b"/>
  <rect x="40" y="88" width="1120" height="24" fill="#1e293b"/>
  <text x="70" y="92" font-size="18" font-weight="600" fill="white">Campaigns</text>

  <!-- ========== FILTER BAR ========== -->
  <rect x="60" y="125" width="1080" height="50" rx="8" fill="#f8fafc"/>

  <!-- Search -->
  <rect x="75" y="135" width="200" height="30" rx="6" fill="white" stroke="#e2e8f0"/>
  <text x="92" y="155" font-size="11" fill="#9ca3af">Search...</text>

  <!-- Divider -->
  <line x1="290" y1="135" x2="290" y2="165" stroke="#e2e8f0"/>

  <!-- Status Segmented Control -->
  <text x="310" y="143" font-size="8" font-weight="600" fill="#64748b" letter-spacing="0.5">STATUS</text>
  <g transform="translate(310, 148)">
    <rect x="0" y="0" width="380" height="26" rx="5" fill="white" stroke="#e2e8f0"/>

    <rect x="2" y="2" width="40" height="22" rx="4" fill="url(#primaryGrad)"/>
    <text x="22" y="17" text-anchor="middle" font-size="9" font-weight="500" fill="white">All (5)</text>

    <text x="60" y="17" text-anchor="middle" font-size="9" fill="#475569">In progress (2)</text>
    <text x="140" y="17" text-anchor="middle" font-size="9" fill="#475569">Completed (1)</text>
    <text x="220" y="17" text-anchor="middle" font-size="9" fill="#475569">Not Started (1)</text>
    <text x="310" y="17" text-anchor="middle" font-size="9" fill="#dc2626" font-weight="500">Error (1)</text>
  </g>

  <!-- Dropdowns -->
  <rect x="720" y="135" width="90" height="30" rx="5" fill="white" stroke="#e2e8f0"/>
  <text x="738" y="155" font-size="10" fill="#1e293b">Region</text>

  <rect x="820" y="135" width="75" height="30" rx="5" fill="white" stroke="#e2e8f0"/>
  <text x="838" y="155" font-size="10" fill="#1e293b">Year</text>

  <!-- New Button -->
  <rect x="1020" y="135" width="100" height="30" rx="5" fill="url(#primaryGrad)"/>
  <text x="1070" y="155" text-anchor="middle" font-size="10" font-weight="500" fill="white">+ New Campaign</text>

  <!-- ========== TABLE ========== -->

  <!-- Header Row -->
  <rect x="60" y="190" width="1080" height="36" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="90" y="213" font-size="8" font-weight="600" fill="#64748b">STATUS</text>
  <text x="180" y="208" font-size="8" font-weight="600" fill="#64748b">CAMPAIGN</text>
  <text x="180" y="224" font-size="6" fill="#3b82f6">sort</text>
  <text x="390" y="213" font-size="8" font-weight="600" fill="#64748b">PROGRESS</text>
  <text x="550" y="213" font-size="8" font-weight="600" fill="#64748b">CONFIDENCE</text>
  <text x="690" y="213" font-size="8" font-weight="600" fill="#64748b">REGION</text>
  <text x="765" y="208" font-size="8" font-weight="600" fill="#64748b">LAST ACTIVITY</text>
  <text x="765" y="224" font-size="6" fill="#3b82f6">sort</text>
  <text x="1060" y="213" font-size="8" font-weight="600" fill="#64748b">ACTIONS</text>

  <!-- ROW 1: Completed -->
  <g transform="translate(0, 226)">
    <rect x="60" y="0" width="1080" height="50" fill="#f0fdf4" stroke="#bbf7d0"/>
    <rect x="60" y="0" width="4" height="50" rx="2" fill="#10b981"/>
    <rect x="90" y="14" width="70" height="20" rx="10" fill="#dcfce7"/>
    <circle cx="108" cy="24" r="3" fill="#10b981"/>
    <text x="118" y="28" font-size="8" fill="#166534">Completed</text>
    <text x="180" y="22" font-size="11" font-weight="500" fill="#1e293b">DC Ballot Access 2024</text>
    <text x="180" y="38" font-size="8" fill="#94a3b8">Election: Nov 2024</text>
    <text x="390" y="22" font-size="10" font-weight="500" fill="#1e293b">847 / 850</text>
    <rect x="390" y="28" width="70" height="5" rx="2" fill="#d1d5db"/>
    <rect x="390" y="28" width="69" height="5" rx="2" fill="#10b981"/>
    <text x="468" y="34" font-size="8" fill="#10b981">99.6%</text>
    <rect x="550" y="15" width="75" height="20" rx="10" fill="#dcfce7"/>
    <text x="587" y="29" text-anchor="middle" font-size="9" font-weight="500" fill="#166534">85% High</text>
    <rect x="690" y="15" width="35" height="20" rx="10" fill="#e2e8f0"/>
    <text x="707" y="29" text-anchor="middle" font-size="8" font-weight="500" fill="#475569">DC</text>
    <text x="765" y="28" font-size="9" fill="#64748b">2 hours ago</text>
    <text x="1060" y="28" font-size="9" fill="#3b82f6">View</text>
  </g>

  <!-- ROW 2: In progress (with job running) -->
  <g transform="translate(0, 276)">
    <rect x="60" y="0" width="1080" height="50" fill="#fefce8" stroke="#fde047"/>
    <rect x="60" y="0" width="4" height="50" rx="2" fill="#f59e0b"/>
    <rect x="90" y="14" width="70" height="20" rx="10" fill="#fef3c7"/>
    <circle cx="108" cy="24" r="3" fill="#f59e0b"/>
    <text x="118" y="28" font-size="8" fill="#b45309">In progress</text>
    <text x="180" y="22" font-size="11" font-weight="500" fill="#1e293b">MD Congressional District 3</text>
    <text x="180" y="38" font-size="8" fill="#94a3b8">Election: Nov 2024</text>
    <text x="390" y="22" font-size="10" font-weight="500" fill="#1e293b">234 / 500</text>
    <rect x="390" y="28" width="70" height="5" rx="2" fill="#d1d5db"/>
    <rect x="390" y="28" width="33" height="5" rx="2" fill="#f59e0b"/>
    <text x="468" y="34" font-size="8" fill="#f59e0b">46.8%</text>
    <rect x="550" y="15" width="75" height="20" rx="10" fill="#fef3c7"/>
    <text x="587" y="29" text-anchor="middle" font-size="9" font-weight="500" fill="#b45309">65% High</text>
    <rect x="690" y="15" width="35" height="20" rx="10" fill="#e2e8f0"/>
    <text x="707" y="29" text-anchor="middle" font-size="8" font-weight="500" fill="#475569">MD</text>
    <text x="765" y="22" font-size="9" fill="#f59e0b" font-weight="500">OCR: 67%...</text>
    <text x="765" y="38" font-size="8" fill="#94a3b8">Running 2m</text>
    <text x="1060" y="28" font-size="9" fill="#3b82f6">View</text>
  </g>

  <!-- ROW 3: Error -->
  <g transform="translate(0, 326)">
    <rect x="60" y="0" width="1080" height="50" fill="#fef2f2" stroke="#fca5a5"/>
    <rect x="60" y="0" width="4" height="50" rx="2" fill="#ef4444"/>
    <rect x="90" y="14" width="45" height="20" rx="10" fill="#fee2e2"/>
    <circle cx="108" cy="24" r="3" fill="#ef4444"/>
    <text x="118" y="28" font-size="8" fill="#991b1b">Error</text>
    <text x="180" y="22" font-size="11" font-weight="500" fill="#1e293b">Ward 7 Council Race</text>
    <text x="180" y="38" font-size="8" fill="#94a3b8">Election: Nov 2024</text>
    <text x="390" y="22" font-size="9" fill="#ef4444" font-weight="500">OCR job failed</text>
    <text x="390" y="38" font-size="8" fill="#dc2626">Rate limit - 45 signatures</text>
    <rect x="550" y="15" width="75" height="20" rx="10" fill="#fee2e2"/>
    <text x="587" y="29" text-anchor="middle" font-size="9" font-weight="500" fill="#991b1b">Partial</text>
    <rect x="690" y="15" width="35" height="20" rx="10" fill="#e2e8f0"/>
    <text x="707" y="29" text-anchor="middle" font-size="8" font-weight="500" fill="#475569">DC</text>
    <text x="765" y="28" font-size="9" fill="#ef4444">Failed 1h ago</text>
    <rect x="1030" y="13" width="60" height="24" rx="4" fill="#ef4444"/>
    <text x="1060" y="30" text-anchor="middle" font-size="9" font-weight="500" fill="white">Retry</text>
  </g>

  <!-- ROW 4: In progress -->
  <g transform="translate(0, 376)">
    <rect x="60" y="0" width="1080" height="50" fill="white" stroke="#e2e8f0"/>
    <rect x="60" y="0" width="4" height="50" rx="2" fill="#10b981"/>
    <rect x="90" y="14" width="70" height="20" rx="10" fill="#dcfce7"/>
    <circle cx="108" cy="24" r="3" fill="#10b981"/>
    <text x="118" y="28" font-size="8" fill="#166534">In progress</text>
    <text x="180" y="22" font-size="11" font-weight="500" fill="#1e293b">VA State Senate 2025</text>
    <text x="180" y="38" font-size="8" fill="#94a3b8">Election: Nov 2025</text>
    <text x="390" y="22" font-size="10" font-weight="500" fill="#1e293b">150 / 300</text>
    <rect x="390" y="28" width="70" height="5" rx="2" fill="#d1d5db"/>
    <rect x="390" y="28" width="35" height="5" rx="2" fill="#10b981"/>
    <text x="468" y="34" font-size="8" fill="#10b981">50%</text>
    <rect x="550" y="15" width="75" height="20" rx="10" fill="#dcfce7"/>
    <text x="587" y="29" text-anchor="middle" font-size="9" font-weight="500" fill="#166534">80% High</text>
    <rect x="690" y="15" width="35" height="20" rx="10" fill="#e2e8f0"/>
    <text x="707" y="29" text-anchor="middle" font-size="8" font-weight="500" fill="#475569">VA</text>
    <text x="765" y="28" font-size="9" fill="#64748b">1 day ago</text>
    <text x="1060" y="28" font-size="9" fill="#3b82f6">View</text>
  </g>

  <!-- ROW 5: Not Started -->
  <g transform="translate(0, 426)">
    <rect x="60" y="0" width="1080" height="50" fill="white" stroke="#e2e8f0"/>
    <rect x="60" y="0" width="4" height="50" rx="2" fill="#94a3b8"/>
    <rect x="90" y="14" width="70" height="20" rx="10" fill="#f1f5f9"/>
    <circle cx="108" cy="24" r="3" fill="#94a3b8"/>
    <text x="118" y="28" font-size="8" fill="#64748b">Not Started</text>
    <text x="180" y="22" font-size="11" font-weight="500" fill="#1e293b">TX Governor 2026</text>
    <text x="180" y="38" font-size="8" fill="#94a3b8">Election: Nov 2026</text>
    <text x="390" y="28" font-size="9" fill="#94a3b8">No uploads yet</text>
    <rect x="550" y="15" width="75" height="20" rx="10" fill="#f1f5f9"/>
    <text x="587" y="29" text-anchor="middle" font-size="9" fill="#94a3b8">-</text>
    <rect x="690" y="15" width="35" height="20" rx="10" fill="#e2e8f0"/>
    <text x="707" y="29" text-anchor="middle" font-size="8" font-weight="500" fill="#475569">TX</text>
    <text x="765" y="28" font-size="9" fill="#94a3b8">Created today</text>
    <rect x="1020" y="13" width="80" height="24" rx="4" fill="url(#primaryGrad)"/>
    <text x="1060" y="30" text-anchor="middle" font-size="9" font-weight="500" fill="white">Get Started</text>
  </g>

  <!-- Pagination -->
  <rect x="60" y="490" width="1080" height="38" rx="6" fill="#f8fafc"/>
  <text x="80" y="514" font-size="9" fill="#64748b">Showing 1-5 of 5 campaigns</text>
  <text x="900" y="514" font-size="9" fill="#64748b">Rows:</text>
  <rect x="930" y="498" width="35" height="22" rx="4" fill="white" stroke="#e2e8f0"/>
  <text x="947" y="514" text-anchor="middle" font-size="9" fill="#1e293b">10</text>

  <!-- Design Notes -->
  <rect x="60" y="540" width="1080" height="40" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="80" y="565" font-size="10" font-weight="600" fill="#1e40af">Key Design Elements:</text>
  <text x="220" y="565" font-size="9" fill="#3b82f6">Simplified confidence badges</text>
  <text x="380" y="565" font-size="9" fill="#3b82f6">Uniform region badges</text>
  <text x="510" y="565" font-size="9" fill="#3b82f6">Per-row actions only</text>
  <text x="650" y="565" font-size="9" fill="#3b82f6">Status borders + row tint</text>
  <text x="820" y="565" font-size="9" fill="#3b82f6">Sortable columns</text>
  <text x="940" y="565" font-size="9" fill="#3b82f6">Smart defaults</text>
</svg>
