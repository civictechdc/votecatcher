<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="successGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="warningGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="sidebarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <filter id="shadowCard" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.05"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="#f1f5f9"/>

  <text x="600" y="22" text-anchor="middle" font-size="16" font-weight="600" fill="#1e293b">Campaign Dashboard - Final v3</text>
  <text x="600" y="38" text-anchor="middle" font-size="10" fill="#64748b">DC Ballot Access 2024 • Metrics, confidence, and jobs at a glance</text>

  <rect x="30" y="50" width="1140" height="730" rx="12" fill="white" filter="url(#shadow)"/>

  <!-- ========== SIDEBAR ========== -->
  <rect x="30" y="50" width="190" height="730" rx="12" fill="url(#sidebarGrad)"/>
  <rect x="208" y="50" width="12" height="730" fill="url(#sidebarGrad)"/>

  <!-- Campaign Selector -->
  <rect x="45" y="70" width="160" height="40" rx="6" fill="rgba(255,255,255,0.1)"/>
  <text x="60" y="88" font-size="9" fill="#94a3b8">Campaign</text>
  <text x="60" y="103" font-size="12" font-weight="600" fill="white">DC Ballot Access 2024</text>
  <text x="180" y="98" font-size="9" fill="#94a3b8">▼</text>

  <!-- Nav -->
  <g transform="translate(45, 125)">
    <rect x="0" y="0" width="160" height="34" rx="5" fill="url(#primaryGrad)"/>
    <text x="14" y="22" font-size="10" fill="white">📊 Dashboard</text>

    <rect x="0" y="42" width="160" height="34" rx="5" fill="transparent"/>
    <text x="14" y="64" font-size="10" fill="#94a3b8">📁 Upload</text>

    <rect x="0" y="84" width="160" height="34" rx="5" fill="transparent"/>
    <text x="14" y="106" font-size="10" fill="#94a3b8">⚡ Jobs</text>
    <rect x="115" y="90" width="28" height="18" rx="9" fill="#10b981"/>
    <text x="129" y="103" text-anchor="middle" font-size="8" fill="white">2</text>

    <rect x="0" y="126" width="160" height="34" rx="5" fill="transparent"/>
    <text x="14" y="148" font-size="10" fill="#94a3b8">📋 Results</text>
    <rect x="115" y="132" width="28" height="18" rx="9" fill="#64748b"/>
    <text x="129" y="145" text-anchor="middle" font-size="8" fill="white">847</text>

    <rect x="0" y="168" width="160" height="34" rx="5" fill="transparent"/>
    <text x="14" y="190" font-size="10" fill="#94a3b8">⚙️ Settings</text>
  </g>

  <!-- Sidebar footer -->
  <line x1="55" y1="710" x2="175" y2="710" stroke="#374151"/>
  <text x="55" y="730" font-size="8" fill="#64748b">Last sync: 2 min ago</text>
  <circle cx="170" cy="725" r="4" fill="#10b981"/>

  <!-- ========== MAIN CONTENT ========== -->

  <!-- Header -->
  <text x="250" y="82" font-size="16" font-weight="600" fill="#1e293b">Dashboard</text>
  <text x="250" y="98" font-size="9" fill="#64748b">Overview of DC Ballot Access 2024</text>

  <!-- Status Badge -->
  <rect x="980" y="70" width="70" height="22" rx="11" fill="#dcfce7"/>
  <circle cx="1000" cy="81" r="4" fill="#10b981"/>
  <text x="1015" y="86" font-size="9" font-weight="500" fill="#166534">Active</text>

  <!-- ========== METRICS ROW ========== -->
  <g transform="translate(250, 120)">
    <!-- Total Signatures -->
    <rect x="0" y="0" width="200" height="85" rx="8" fill="white" filter="url(#shadowCard)"/>
    <rect x="0" y="0" width="4" height="85" rx="2" fill="url(#successGrad)"/>
    <text x="14" y="20" font-size="9" font-weight="500" fill="#64748b">Total Signatures</text>
    <text x="14" y="54" font-size="28" font-weight="700" fill="#1e293b">847</text>
    <text x="68" y="54" font-size="11" fill="#64748b">/ 850</text>
    <rect x="14" y="62" width="140" height="5" rx="2" fill="#e2e8f0"/>
    <rect x="14" y="62" width="139" height="5" rx="2" fill="url(#successGrad)"/>
    <text x="160" y="70" font-size="8" font-weight="500" fill="#10b981">99.6%</text>

    <!-- High Confidence -->
    <rect x="215" y="0" width="200" height="85" rx="8" fill="white" filter="url(#shadowCard)"/>
    <rect x="215" y="0" width="4" height="85" rx="2" fill="url(#primaryGrad)"/>
    <text x="229" y="20" font-size="9" font-weight="500" fill="#64748b">High Confidence</text>
    <text x="229" y="54" font-size="28" font-weight="700" fill="#1e293b">723</text>
    <text x="280" y="54" font-size="11" fill="#3b82f6">85.4%</text>
    <text x="229" y="72" font-size="8" fill="#3b82f6">✓ Ready for submission</text>

    <!-- Needs Review -->
    <rect x="430" y="0" width="200" height="85" rx="8" fill="white" filter="url(#shadowCard)"/>
    <rect x="430" y="0" width="4" height="85" rx="2" fill="url(#warningGrad)"/>
    <text x="444" y="20" font-size="9" font-weight="500" fill="#64748b">Needs Review</text>
    <text x="444" y="54" font-size="28" font-weight="700" fill="#1e293b">124</text>
    <text x="492" y="54" font-size="11" fill="#f59e0b">14.6%</text>
    <text x="444" y="72" font-size="8" fill="#f59e0b">⚠ Medium + Low confidence</text>

    <!-- Last Job -->
    <rect x="645" y="0" width="170" height="85" rx="8" fill="white" filter="url(#shadowCard)"/>
    <text x="659" y="20" font-size="9" font-weight="500" fill="#64748b">Last Job</text>
    <rect x="659" y="30" width="50" height="18" rx="9" fill="#dcfce7"/>
    <text x="684" y="43" text-anchor="middle" font-size="8" font-weight="500" fill="#166534">Complete</text>
    <text x="659" y="62" font-size="9" fill="#1e293b">Job #12 • 2h ago</text>
    <text x="659" y="76" font-size="8" fill="#64748b">2m 34s • 85.4% High</text>
    <text x="790" y="62" font-size="8" fill="#3b82f6">View →</text>
  </g>

  <!-- ========== CONFIDENCE + JOBS ROW ========== -->

  <!-- Confidence Distribution (Larger) -->
  <rect x="250" y="225" width="440" height="300" rx="10" fill="white" filter="url(#shadowCard)"/>
  <text x="270" y="252" font-size="12" font-weight="600" fill="#1e293b">Confidence Distribution</text>
  <text x="660" y="252" text-anchor="end" font-size="9" fill="#3b82f6">Click to filter →</text>

  <!-- Large Donut -->
  <g transform="translate(390, 400)">
    <!-- High (85.4%) -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="#10b981" stroke-width="24" stroke-dasharray="430 503" stroke-dashoffset="0" transform="rotate(-90)"/>
    <!-- Medium (11.5%) -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="#f59e0b" stroke-width="24" stroke-dasharray="58 503" stroke-dashoffset="-430" transform="rotate(-90)"/>
    <!-- Low (3.1%) -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="#ef4444" stroke-width="24" stroke-dasharray="15 503" stroke-dashoffset="-488" transform="rotate(-90)"/>

    <text x="0" y="-8" text-anchor="middle" font-size="28" font-weight="700" fill="#1e293b">847</text>
    <text x="0" y="12" text-anchor="middle" font-size="10" fill="#64748b">signatures</text>
  </g>

  <!-- Legend (Right of donut) -->
  <g transform="translate(520, 290)">
    <rect x="0" y="0" width="140" height="100" rx="8" fill="#f8fafc"/>
    <text x="10" y="20" font-size="10" font-weight="600" fill="#1e293b">Breakdown</text>

    <rect x="10" y="32" width="12" height="12" rx="2" fill="#10b981"/>
    <text x="28" y="42" font-size="10" fill="#1e293b">High (≥85%)</text>
    <text x="100" y="42" font-size="10" font-weight="600" fill="#10b981">723</text>
    <text x="125" y="42" font-size="9" fill="#64748b">85%</text>

    <rect x="10" y="52" width="12" height="12" rx="2" fill="#f59e0b"/>
    <text x="28" y="62" font-size="10" fill="#1e293b">Medium (60-84%)</text>
    <text x="100" y="62" font-size="10" font-weight="600" fill="#f59e0b">98</text>
    <text x="125" y="62" font-size="9" fill="#64748b">12%</text>

    <rect x="10" y="72" width="12" height="12" rx="2" fill="#ef4444"/>
    <text x="28" y="82" font-size="10" fill="#1e293b">Low (&lt;60%)</text>
    <text x="100" y="82" font-size="10" font-weight="600" fill="#ef4444">26</text>
    <text x="125" y="82" font-size="9" fill="#64748b">3%</text>
  </g>

  <!-- Recent Jobs (Right side) -->
  <rect x="710" y="225" width="400" height="300" rx="10" fill="white" filter="url(#shadowCard)"/>
  <text x="730" y="252" font-size="12" font-weight="600" fill="#1e293b">Recent Jobs</text>
  <text x="1080" y="252" text-anchor="end" font-size="9" fill="#3b82f6">View all →</text>

  <!-- Job 1 -->
  <rect x="730" y="270" width="360" height="55" rx="6" fill="#f8fafc"/>
  <rect x="730" y="270" width="3" height="55" rx="1" fill="#10b981"/>
  <text x="745" y="290" font-size="9" fill="#64748b">#12</text>
  <rect x="770" y="278" width="55" height="18" rx="9" fill="#dcfce7"/>
  <text x="797" y="291" text-anchor="middle" font-size="8" font-weight="500" fill="#166534">Complete</text>
  <text x="835" y="290" font-size="9" fill="#1e293b">GPT-4o</text>
  <text x="900" y="290" font-size="9" fill="#64748b">847 signatures</text>
  <text x="1020" y="290" font-size="9" fill="#64748b">2h ago</text>
  <text x="745" y="310" font-size="8" fill="#64748b">2m 34s • Confidence: 85.4% High</text>
  <text x="1060" y="310" text-anchor="end" font-size="9" fill="#3b82f6">View</text>

  <!-- Job 2 -->
  <rect x="730" y="335" width="360" height="55" rx="6" fill="#f8fafc"/>
  <rect x="730" y="335" width="3" height="55" rx="1" fill="#10b981"/>
  <text x="745" y="355" font-size="9" fill="#64748b">#11</text>
  <rect x="770" y="343" width="55" height="18" rx="9" fill="#dcfce7"/>
  <text x="797" y="356" text-anchor="middle" font-size="8" font-weight="500" fill="#166534">Complete</text>
  <text x="835" y="355" font-size="9" fill="#1e293b">Gemini 1.5</text>
  <text x="910" y="355" font-size="9" fill="#64748b">234 signatures</text>
  <text x="1020" y="355" font-size="9" fill="#64748b">1d ago</text>
  <text x="745" y="375" font-size="8" fill="#64748b">45s • Confidence: 92.1% High</text>
  <text x="1060" y="375" text-anchor="end" font-size="9" fill="#3b82f6">View</text>

  <!-- Job 3 (Running) -->
  <rect x="730" y="400" width="360" height="55" rx="6" fill="#fefce8"/>
  <rect x="730" y="400" width="3" height="55" rx="1" fill="#f59e0b"/>
  <text x="745" y="420" font-size="9" fill="#64748b">#13</text>
  <rect x="770" y="408" width="45" height="18" rx="9" fill="#fef3c7"/>
  <text x="792" y="421" text-anchor="middle" font-size="8" font-weight="500" fill="#b45309">Running</text>
  <text x="825" y="420" font-size="9" fill="#1e293b">GPT-4o</text>
  <text x="900" y="420" font-size="9" fill="#f59e0b">67 / 200 (34%)</text>
  <text x="1020" y="420" font-size="9" fill="#f59e0b">Live</text>
  <rect x="745" y="436" width="100" height="5" rx="2" fill="#fde047"/>
  <rect x="745" y="436" width="34" height="5" rx="2" fill="#f59e0b"/>
  <text x="855" y="443" font-size="8" fill="#f59e0b">OCR: 67% • ETA ~2m</text>
  <text x="1060" y="443" text-anchor="end" font-size="9" fill="#3b82f6">View</text>

  <!-- Job 4 -->
  <rect x="730" y="465" width="360" height="55" rx="6" fill="#f8fafc"/>
  <rect x="730" y="465" width="3" height="55" rx="1" fill="#10b981"/>
  <text x="745" y="485" font-size="9" fill="#64748b">#10</text>
  <rect x="770" y="473" width="55" height="18" rx="9" fill="#dcfce7"/>
  <text x="797" y="486" text-anchor="middle" font-size="8" font-weight="500" fill="#166534">Complete</text>
  <text x="835" y="485" font-size="9" fill="#1e293b">Mistral</text>
  <text x="900" y="485" font-size="9" fill="#64748b">150 signatures</text>
  <text x="1020" y="485" font-size="9" fill="#64748b">3d ago</text>
  <text x="745" y="505" font-size="8" fill="#64748b">1m 12s • Confidence: 88.2% High</text>
  <text x="1060" y="505" text-anchor="end" font-size="9" fill="#3b82f6">View</text>

  <!-- ========== QUICK ACTIONS ========== -->
  <rect x="250" y="545" width="860" height="85" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="270" y="572" font-size="11" font-weight="600" fill="#1e293b">Quick Actions</text>

  <g transform="translate(270, 585)">
    <rect x="0" y="0" width="100" height="35" rx="5" fill="url(#primaryGrad)"/>
    <text x="50" y="15" text-anchor="middle" font-size="9" fill="white">📤 Upload More</text>
    <text x="50" y="28" text-anchor="middle" font-size="7" fill="rgba(255,255,255,0.7)">Add files</text>

    <rect x="110" y="0" width="100" height="35" rx="5" fill="url(#primaryGrad)"/>
    <text x="160" y="15" text-anchor="middle" font-size="9" fill="white">📋 View Results</text>
    <text x="160" y="28" text-anchor="middle" font-size="7" fill="rgba(255,255,255,0.7)">847 matched</text>

    <rect x="220" y="0" width="90" height="35" rx="5" fill="#f1f5f9" stroke="#e2e8f0"/>
    <text x="265" y="15" text-anchor="middle" font-size="9" fill="#1e293b">📥 Export CSV</text>
    <text x="265" y="28" text-anchor="middle" font-size="7" fill="#64748b">Download</text>

    <rect x="320" y="0" width="85" height="35" rx="5" fill="#fefce8" stroke="#fde047"/>
    <text x="362" y="15" text-anchor="middle" font-size="9" fill="#92400e">⚠ Review 26</text>
    <text x="362" y="28" text-anchor="middle" font-size="7" fill="#a16207">Low confidence</text>

    <rect x="415" y="0" width="100" height="35" rx="5" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="465" y="15" text-anchor="middle" font-size="9" fill="#1e40af">💾 Save Session</text>
    <text x="465" y="28" text-anchor="middle" font-size="7" fill="#3b82f6">Export workspace</text>

    <rect x="525" y="0" width="90" height="35" rx="5" fill="#f1f5f9" stroke="#e2e8f0"/>
    <text x="570" y="15" text-anchor="middle" font-size="9" fill="#1e293b">⚙️ Settings</text>
    <text x="570" y="28" text-anchor="middle" font-size="7" fill="#64748b">Configure</text>
  </g>

  <!-- ========== INSIGHTS ========== -->
  <rect x="250" y="650" width="860" height="55" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="270" y="675" font-size="10" font-weight="600" fill="#1e40af">💡 Insights</text>

  <circle cx="290" cy="690" r="4" fill="#10b981"/>
  <text x="302" y="694" font-size="9" fill="#1e40af">723 high confidence signatures ready for submission</text>

  <circle cx="540" cy="690" r="4" fill="#f59e0b"/>
  <text x="552" y="694" font-size="9" fill="#1e40af">26 need review</text>

  <circle cx="670" cy="690" r="4" fill="#3b82f6"/>
  <text x="682" y="694" font-size="9" fill="#1e40af">Job #13 running • ETA: ~2m</text>

  <!-- Target progress -->
  <text x="270" y="710" font-size="8" fill="#64748b">Target: 850 signatures • Remaining: 3 (0.4%)</text>

  <!-- Design Notes -->
  <rect x="250" y="720" width="860" height="50" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="270" y="740" font-size="9" font-weight="600" fill="#1e293b">Changes from v2</text>
  <g transform="translate(270, 755)">
    <text x="0" y="0" font-size="8" fill="#3b82f6">✓ Removed verification progress bar chart</text>
    <text x="220" y="0" font-size="8" fill="#3b82f6">✓ Larger confidence donut chart</text>
    <text x="400" y="0" font-size="8" fill="#3b82f6">✓ Recent jobs moved to right side</text>
    <text x="580" y="0" font-size="8" fill="#3b82f6">✓ Quick actions in single row</text>
  </g>
</svg>
