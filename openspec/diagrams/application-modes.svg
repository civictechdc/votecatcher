<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, -apple-system, sans-serif">
  <rect width="900" height="500" fill="#f8fafc"/>

  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="600" fill="#1e293b">Application Modes</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#64748b">Three distinct modes for different use cases</text>

  <!-- Simulation Mode -->
  <rect x="50" y="80" width="260" height="280" rx="12" fill="white" stroke="#a78bfa" stroke-width="2"/>
  <rect x="50" y="80" width="260" height="50" rx="12" fill="#8b5cf6"/>
  <rect x="50" y="118" width="260" height="12" fill="#8b5cf6"/>
  <text x="180" y="112" text-anchor="middle" font-size="14" font-weight="600" fill="white">Simulation Mode</text>

  <text x="70" y="155" font-size="11" font-weight="500" fill="#1e293b">Purpose:</text>
  <text x="70" y="173" font-size="10" fill="#64748b">Quick demos, UI testing, screenshots</text>

  <text x="70" y="198" font-size="11" font-weight="500" fill="#1e293b">Behavior:</text>
  <text x="70" y="216" font-size="10" fill="#64748b">- No backend API calls</text>
  <text x="70" y="231" font-size="10" fill="#64748b">- No LLM API calls</text>
  <text x="70" y="246" font-size="10" fill="#64748b">- Fake file uploads (instant)</text>
  <text x="70" y="261" font-size="10" fill="#64748b">- Pre-rendered results</text>
  <text x="70" y="276" font-size="10" fill="#64748b">- Simulated progress bars</text>

  <text x="70" y="300" font-size="11" font-weight="500" fill="#1e293b">Reset:</text>
  <text x="70" y="318" font-size="10" fill="#64748b">Page refresh or button</text>

  <rect x="70" y="335" width="220" height="18" rx="4" fill="#f3e8ff" stroke="#c4b5fd"/>
  <text x="180" y="349" text-anchor="middle" font-size="9" fill="#7c3aed">Flag: simulation_mode</text>

  <!-- Demo Mode -->
  <rect x="320" y="80" width="260" height="280" rx="12" fill="white" stroke="#fbbf24" stroke-width="2"/>
  <rect x="320" y="80" width="260" height="50" rx="12" fill="#f59e0b"/>
  <rect x="320" y="118" width="260" height="12" fill="#f59e0b"/>
  <text x="450" y="112" text-anchor="middle" font-size="14" font-weight="600" fill="white">Demo Mode</text>

  <text x="340" y="155" font-size="11" font-weight="500" fill="#1e293b">Purpose:</text>
  <text x="340" y="173" font-size="10" fill="#64748b">Stakeholder walkthroughs</text>

  <text x="340" y="198" font-size="11" font-weight="500" fill="#1e293b">Behavior:</text>
  <text x="340" y="216" font-size="10" fill="#64748b">- Sample data (pre-baked)</text>
  <text x="340" y="231" font-size="10" fill="#64748b">- Real OCR/matching runs</text>
  <text x="340" y="246" font-size="10" fill="#64748b">- Real progress indicators</text>
  <text x="340" y="261" font-size="10" fill="#64748b">- Limited file uploads</text>

  <text x="340" y="300" font-size="11" font-weight="500" fill="#1e293b">Reset:</text>
  <text x="340" y="318" font-size="10" fill="#64748b">Demo reset button</text>

  <rect x="340" y="335" width="220" height="18" rx="4" fill="#fef3c7" stroke="#fcd34d"/>
  <text x="450" y="349" text-anchor="middle" font-size="9" fill="#b45309">Flag: demo_mode</text>

  <!-- Evaluation Mode -->
  <rect x="590" y="80" width="260" height="280" rx="12" fill="white" stroke="#34d399" stroke-width="2"/>
  <rect x="590" y="80" width="260" height="50" rx="12" fill="#10b981"/>
  <rect x="590" y="118" width="260" height="12" fill="#10b981"/>
  <text x="720" y="112" text-anchor="middle" font-size="14" font-weight="600" fill="white">Evaluation Mode</text>

  <text x="610" y="155" font-size="11" font-weight="500" fill="#1e293b">Purpose:</text>
  <text x="610" y="173" font-size="10" fill="#64748b">Testing, benchmarking, QA</text>

  <text x="610" y="198" font-size="11" font-weight="500" fill="#1e293b">Behavior:</text>
  <text x="610" y="216" font-size="10" fill="#64748b">- Real backend calls</text>
  <text x="610" y="231" font-size="10" fill="#64748b">- Real LLM API calls</text>
  <text x="610" y="246" font-size="10" fill="#64748b">- Real file uploads</text>
  <text x="610" y="261" font-size="10" fill="#64748b">- Performance metrics logged</text>

  <text x="610" y="300" font-size="11" font-weight="500" fill="#1e293b">Environment:</text>
  <text x="610" y="318" font-size="10" fill="#64748b">Non-production deployment</text>

  <rect x="610" y="335" width="220" height="18" rx="4" fill="#d1fae5" stroke="#6ee7b7"/>
  <text x="720" y="349" text-anchor="middle" font-size="9" fill="#047857">Flag: evaluation_mode</text>

  <!-- Comparison Table Header -->
  <rect x="50" y="385" width="800" height="30" fill="#1e293b" rx="4"/>
  <text x="110" y="405" font-size="10" font-weight="500" fill="white">Feature</text>
  <text x="180" y="405" text-anchor="middle" font-size="10" font-weight="500" fill="white">Simulation</text>
  <text x="320" y="405" text-anchor="middle" font-size="10" font-weight="500" fill="white">Demo</text>
  <text x="450" y="405" text-anchor="middle" font-size="10" font-weight="500" fill="white">Evaluation</text>

  <!-- Backend calls -->
  <rect x="50" y="415" width="800" height="24" fill="white" stroke="#e2e8f0"/>
  <text x="110" y="432" font-size="9" fill="#64748b">Backend API</text>
  <text x="180" y="432" text-anchor="middle" font-size="9" fill="#ef4444">Mocked</text>
  <text x="320" y="432" text-anchor="middle" font-size="9" fill="#10b981">Real</text>
  <text x="450" y="432" text-anchor="middle" font-size="9" fill="#10b981">Real</text>

  <!-- LLM calls -->
  <rect x="50" y="439" width="800" height="24" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="110" y="456" font-size="9" fill="#64748b">LLM API</text>
  <text x="180" y="456" text-anchor="middle" font-size="9" fill="#ef4444">Mocked</text>
  <text x="320" y="456" text-anchor="middle" font-size="9" fill="#10b981">Real</text>
  <text x="450" y="456" text-anchor="middle" font-size="9" fill="#10b981">Real</text>

  <!-- File uploads -->
  <rect x="50" y="463" width="800" height="24" fill="white" stroke="#e2e8f0"/>
  <text x="110" y="480" font-size="9" fill="#64748b">File Uploads</text>
  <text x="180" y="480" text-anchor="middle" font-size="9" fill="#a78bfa">Fake</text>
  <text x="320" y="480" text-anchor="middle" font-size="9" fill="#f59e0b">Sample</text>
  <text x="450" y="480" text-anchor="middle" font-size="9" fill="#10b981">Real</text>

  <!-- Use case labels -->
  <text x="600" y="420" font-size="9" fill="#64748b">Use Cases:</text>
  <text x="600" y="435" font-size="8" fill="#94a3b8">- Simulation: Sales demos, screenshots</text>
  <text x="600" y="448" font-size="8" fill="#94a3b8">- Demo: Stakeholder walkthroughs</text>
  <text x="600" y="461" font-size="8" fill="#94a3b8">- Evaluation: Internal testing, benchmarks</text>
  <text x="600" y="474" font-size="8" fill="#94a3b8">- Production: Real campaigns</text>
</svg>
