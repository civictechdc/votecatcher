<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="900" height="650" fill="#f8fafc"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="600" fill="#1e293b">Proposed Page Hierarchy</text>

  <!-- Workspace Level -->
  <rect x="300" y="60" width="300" height="70" rx="8" fill="#3b82f6" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="90" text-anchor="middle" font-size="14" font-weight="600" fill="white">/workspace</text>
  <text x="450" y="112" text-anchor="middle" font-size="11" fill="#dbeafe">Campaign List (status cards)</text>

  <!-- Connector -->
  <line x1="450" y1="130" x2="450" y2="160" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Campaign Detail -->
  <rect x="250" y="160" width="400" height="80" rx="8" fill="#10b981" stroke="#059669" stroke-width="2"/>
  <text x="450" y="190" text-anchor="middle" font-size="14" font-weight="600" fill="white">/workspace/[campaign_id]</text>
  <text x="450" y="210" text-anchor="middle" font-size="11" fill="#d1fae5">Campaign Dashboard</text>
  <text x="450" y="228" text-anchor="middle" font-size="10" fill="#d1fae5">Metrics: signatures, confidence breakdown, progress</text>

  <!-- Connectors to sub-pages -->
  <line x1="350" y1="240" x2="200" y2="300" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="240" x2="450" y2="300" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="550" y1="240" x2="700" y2="300" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Jobs Page -->
  <rect x="75" y="300" width="250" height="70" rx="8" fill="#8b5cf6" stroke="#7c3aed" stroke-width="2"/>
  <text x="200" y="330" text-anchor="middle" font-size="13" font-weight="600" fill="white">/workspace/[id]/jobs</text>
  <text x="200" y="350" text-anchor="middle" font-size="10" fill="#ede9fe">Jobs for THIS campaign</text>
  <text x="200" y="362" text-anchor="middle" font-size="9" fill="#ede9fe">Create, view, cancel jobs</text>

  <!-- Results Page -->
  <rect x="325" y="300" width="250" height="70" rx="8" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>
  <text x="450" y="330" text-anchor="middle" font-size="13" font-weight="600" fill="white">/workspace/[id]/results</text>
  <text x="450" y="350" text-anchor="middle" font-size="10" fill="#fef3c7">Match results for campaign</text>
  <text x="450" y="362" text-anchor="middle" font-size="9" fill="#fef3c7">Table, filters, export</text>

  <!-- Upload Page (new) -->
  <rect x="575" y="300" width="250" height="70" rx="8" fill="#ec4899" stroke="#db2777" stroke-width="2"/>
  <text x="700" y="330" text-anchor="middle" font-size="13" font-weight="600" fill="white">/workspace/[id]/upload</text>
  <text x="700" y="350" text-anchor="middle" font-size="10" fill="#fce7f3">Upload petitions/voters</text>
  <text x="700" y="362" text-anchor="middle" font-size="9" fill="#fce7f3">Files for THIS campaign</text>

  <!-- Job Detail -->
  <line x1="200" y1="370" x2="200" y2="410" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="75" y="410" width="250" height="55" rx="8" fill="#6366f1" stroke="#4f46e5" stroke-width="2"/>
  <text x="200" y="435" text-anchor="middle" font-size="12" font-weight="600" fill="white">/workspace/[id]/jobs/[job_id]</text>
  <text x="200" y="455" text-anchor="middle" font-size="10" fill="#e0e7ff">Job details, status, SSE updates</text>

  <!-- Settings (global) -->
  <rect x="600" y="500" width="250" height="70" rx="8" fill="#64748b" stroke="#475569" stroke-width="2"/>
  <text x="725" y="530" text-anchor="middle" font-size="13" font-weight="600" fill="white">/workspace/settings</text>
  <text x="725" y="550" text-anchor="middle" font-size="10" fill="#e2e8f0">Global Settings</text>
  <text x="725" y="562" text-anchor="middle" font-size="9" fill="#e2e8f0">LLM Providers, Feature Flags</text>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Legend -->
  <rect x="50" y="500" width="500" height="90" rx="8" fill="#f1f5f9" stroke="#e2e8f0"/>
  <text x="70" y="525" font-size="12" font-weight="600" fill="#475569">Key Changes:</text>
  <text x="70" y="545" font-size="10" fill="#64748b">• Campaign becomes the primary navigation unit</text>
  <text x="70" y="560" font-size="10" fill="#64748b">• Jobs &amp; Results scoped to specific campaign</text>
  <text x="70" y="575" font-size="10" fill="#64748b">• Settings page manages global LLM provider configs</text>
</svg>
