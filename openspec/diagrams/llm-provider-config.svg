<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="900" height="700" fill="#f8fafc"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="600" fill="#1e293b">LLM Provider Configuration</text>

  <!-- Settings Page Container -->
  <rect x="50" y="60" width="800" height="620" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>

  <!-- Tabs -->
  <rect x="50" y="60" width="800" height="45" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="50" y="60" width="150" height="45" fill="white" stroke="#e2e8f0" stroke-bottom="none"/>
  <text x="125" y="88" text-anchor="middle" font-size="13" font-weight="500" fill="#1e293b">LLM Providers</text>
  <text x="250" y="88" text-anchor="middle" font-size="13" fill="#64748b">Feature Flags</text>
  <text x="360" y="88" text-anchor="middle" font-size="13" fill="#64748b">General</text>

  <!-- Provider Card 1: OpenAI -->
  <rect x="80" y="125" width="740" height="130" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Provider header -->
  <rect x="80" y="125" width="740" height="35" rx="8" fill="#10b981"/>
  <rect x="80" y="150" width="740" height="10" fill="#10b981"/>
  <circle cx="105" cy="142" r="10" fill="white"/>
  <text x="105" y="147" text-anchor="middle" font-size="10" fill="#10b981">✓</text>
  <text x="130" y="147" font-size="13" font-weight="600" fill="white">OpenAI</text>
  <text x="760" y="147" text-anchor="end" font-size="11" fill="#d1fae5">Connected</text>

  <!-- Config fields -->
  <text x="100" y="185" font-size="11" fill="#64748b">API Key:</text>
  <rect x="160" y="170" width="250" height="24" rx="4" fill="white" stroke="#e2e8f0"/>
  <text x="170" y="186" font-size="11" fill="#1e293b">sk-proj-••••••••••••••••••••</text>

  <text x="430" y="185" font-size="11" fill="#64748b">Model:</text>
  <rect x="480" y="170" width="180" height="24" rx="4" fill="white" stroke="#e2e8f0"/>
  <text x="490" y="186" font-size="11" fill="#1e293b">gpt-4o</text>
  <text x="640" y="186" font-size="9" fill="#94a3b8">▼</text>

  <text x="680" y="185" font-size="11" fill="#64748b">Batch:</text>
  <text x="720" y="185" font-size="11" fill="#10b981">Supported ✓</text>

  <!-- Buttons -->
  <rect x="680" y="210" width="60" height="24" rx="4" fill="#3b82f6"/>
  <text x="710" y="226" text-anchor="middle" font-size="10" fill="white">Edit</text>
  <rect x="750" y="210" width="60" height="24" rx="4" fill="#fef2f2" stroke="#fecaca"/>
  <text x="780" y="226" text-anchor="middle" font-size="10" fill="#dc2626">Remove</text>

  <!-- Provider Card 2: Gemini -->
  <rect x="80" y="270" width="740" height="130" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Provider header -->
  <rect x="80" y="270" width="740" height="35" rx="8" fill="#10b981"/>
  <rect x="80" y="295" width="740" height="10" fill="#10b981"/>
  <circle cx="105" cy="287" r="10" fill="white"/>
  <text x="105" y="292" text-anchor="middle" font-size="10" fill="#10b981">✓</text>
  <text x="130" y="292" font-size="13" font-weight="600" fill="white">Google Gemini</text>
  <text x="760" y="292" text-anchor="end" font-size="11" fill="#d1fae5">Connected</text>

  <!-- Config fields -->
  <text x="100" y="330" font-size="11" fill="#64748b">API Key:</text>
  <rect x="160" y="315" width="250" height="24" rx="4" fill="white" stroke="#e2e8f0"/>
  <text x="170" y="331" font-size="11" fill="#1e293b">AIza••••••••••••••••••••••</text>

  <text x="430" y="330" font-size="11" fill="#64748b">Model:</text>
  <rect x="480" y="315" width="180" height="24" rx="4" fill="white" stroke="#e2e8f0"/>
  <text x="490" y="331" font-size="11" fill="#1e293b">gemini-1.5-flash</text>
  <text x="640" y="331" font-size="9" fill="#94a3b8">▼</text>

  <text x="680" y="330" font-size="11" fill="#64748b">Batch:</text>
  <text x="720" y="330" font-size="11" fill="#10b981">Supported ✓</text>

  <!-- Buttons -->
  <rect x="680" y="355" width="60" height="24" rx="4" fill="#3b82f6"/>
  <text x="710" y="371" text-anchor="middle" font-size="10" fill="white">Edit</text>
  <rect x="750" y="355" width="60" height="24" rx="4" fill="#fef2f2" stroke="#fecaca"/>
  <text x="780" y="371" text-anchor="middle" font-size="10" fill="#dc2626">Remove</text>

  <!-- Provider Card 3: Mistral (not configured) -->
  <rect x="80" y="415" width="740" height="100" rx="8" fill="white" stroke="#e2e8f0" stroke-dasharray="4"/>

  <text x="105" y="450" font-size="13" font-weight="500" fill="#94a3b8">Mistral AI</text>
  <text x="760" y="450" text-anchor="end" font-size="11" fill="#94a3b8">Not Configured</text>

  <text x="105" y="480" font-size="10" fill="#cbd5e1">Add API key to enable Mistral OCR processing</text>

  <rect x="680" y="460" width="80" height="28" rx="4" fill="#f1f5f9" stroke="#e2e8f0"/>
  <text x="720" y="478" text-anchor="middle" font-size="11" fill="#64748b">+ Configure</text>

  <!-- Add Provider Button -->
  <rect x="80" y="535" width="200" height="36" rx="6" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="180" y="558" text-anchor="middle" font-size="12" fill="#3b82f6">+ Add Custom Provider</text>

  <!-- Info box -->
  <rect x="80" y="590" width="740" height="70" rx="6" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="100" y="615" font-size="11" font-weight="500" fill="#1e40af">Model Selection</text>
  <text x="100" y="635" font-size="10" fill="#3b82f6">• Models are fetched from provider APIs where supported, otherwise enter manually</text>
  <text x="100" y="650" font-size="10" fill="#3b82f6">• Only models supporting batch operations are shown for OCR jobs</text>
</svg>
