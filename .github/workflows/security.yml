name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'

jobs:
  backend-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install dependencies
        run: cd backend && uv sync --dev

      - name: Run backend security scan
        run: just security-scan-backend

  frontend-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            frontend/node_modules/.cache
          key: bun-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            bun-

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install dependencies
        run: cd frontend && bun install --frozen-lockfile

      - name: Run frontend security scan
        run: just security-scan-frontend

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.24.3
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz -C /usr/local/bin

      - name: Run gitleaks
        run: gitleaks detect --verbose .

  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Run semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: "auto,p/owasp-top-ten,p/fastapi,p/jwt,p/xss"
          baseline-commit: ${{ github.base_ref || 'main' }}
          generateSarif: "1"

      - name: Upload semgrep results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results
          path: semgrep-results.json

  sca:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install dependencies
        run: |
          cd backend && uv sync --dev
          cd "${GITHUB_WORKSPACE}" && cd frontend && bun install --frozen-lockfile

      - name: Install osv-scanner
        run: go install github.com/google/osv-scanner/cmd/osv-scanner@latest

      - name: Run SCA scan
        run: just sca

      - name: Upload SCA results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sca-results
          path: |
            osv-results.json
            trivy-results.json

  container-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t votecatcher-backend ./backend

      - name: Build frontend Docker image
        run: docker build -t votecatcher-frontend ./frontend

      - name: Run Trivy on backend
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: votecatcher-backend
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Run Trivy on frontend
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: votecatcher-frontend
          severity: CRITICAL,HIGH
          exit-code: 1

  dast:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install nuclei
        run: go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest

      - name: Update nuclei templates
        run: nuclei -update-templates

      - name: Install dependencies
        run: cd backend && uv sync --dev

      - name: Start backend
        run: cd backend && uv run python -m app &
        env:
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/health > /dev/null 2>&1; then
              echo "Backend is ready"
              exit 0
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done
          echo "ERROR: Backend did not become ready in 60 seconds"
          exit 1

      - name: Run DAST scan
        run: just dast

      - name: Check for HIGH/CRITICAL findings
        if: always()
        run: |
          if [ -f nuclei-results.json ]; then
            HIGH_CRIT=$(grep -c '"severity":"critical"\|"severity":"high"' nuclei-results.json 2>/dev/null || echo "0")
            if [ "$HIGH_CRIT" -gt 0 ]; then
              echo "::error::$HIGH_CRIT HIGH/CRITICAL DAST findings detected"
              exit 1
            fi
            echo "No HIGH/CRITICAL DAST findings"
          fi

      - name: Upload nuclei results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nuclei-results
          path: nuclei-results.json
