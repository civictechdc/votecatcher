name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lockfile-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Check Python lockfile
        run: cd backend && uv lock --check

      - name: Check JS lockfile
        run: cd frontend-svelt && bun install --frozen-lockfile

  docs-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate documentation accuracy
        run: bash scripts/validate-docs.sh

  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      frontend-next: ${{ steps.filter.outputs.frontend-next }}
      frontend-svelt: ${{ steps.filter.outputs.frontend-svelt }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'justfile'
            frontend:
              - 'frontend-svelt/**'
              - 'justfile'
            frontend-next:
              - 'frontend/**'
            frontend-svelt:
              - 'frontend-svelt/**'

  backend-lint:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install dependencies
        run: cd backend && uv sync --dev

      - name: Run backend lint
        run: just lint-backend

  backend-typecheck:
    needs: [backend-lint]
    if: needs.backend-lint.result == 'success' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install dependencies
        run: cd backend && uv sync --dev

      - name: Run backend typecheck
        run: just typecheck-backend

  backend-test:
    needs: [backend-typecheck]
    if: needs.backend-typecheck.result == 'success' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install dependencies
        run: cd backend && uv sync --dev

      - name: Run backend tests
        run: just test-backend

      - name: Annotate test failures
        if: failure()
        run: |
          if [ -f backend/coverage.xml ]; then
            echo "::group::Backend Test Results"
            echo "Tests failed — check logs above for details"
            echo "::endgroup::"
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          fail_ci_if_error: true

  frontend-lint:
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Cache bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            frontend-svelt/node_modules/.cache
          key: bun-${{ hashFiles('frontend-svelt/bun.lock') }}
          restore-keys: |
            bun-

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install dependencies
        run: cd frontend-svelt && bun install --frozen-lockfile

      - name: Run frontend lint
        run: just lint-frontend

  frontend-typecheck:
    needs: [frontend-lint]
    if: needs.frontend-lint.result == 'success' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Cache bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            frontend-svelt/node_modules/.cache
          key: bun-${{ hashFiles('frontend-svelt/bun.lock') }}
          restore-keys: |
            bun-

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install dependencies
        run: cd frontend-svelt && bun install --frozen-lockfile

      - name: Run frontend typecheck
        run: just typecheck-frontend

  frontend-test:
    needs: [frontend-typecheck]
    if: needs.frontend-typecheck.result == 'success' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Cache bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            frontend-svelt/node_modules/.cache
          key: bun-${{ hashFiles('frontend-svelt/bun.lock') }}
          restore-keys: |
            bun-

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install dependencies
        run: cd frontend-svelt && bun install --frozen-lockfile

      - name: Run frontend tests
        run: just test-frontend

  frontend-fallow:
    needs: [changes]
    if: needs.changes.outputs.frontend-next == 'true' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run fallow audit
        run: cd frontend && npx fallow audit --base origin/main --format compact

  frontend-svelt-fallow:
    needs: [changes]
    if: needs.changes.outputs.frontend-svelt == 'true' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: cd frontend-svelt && bun install --frozen-lockfile

      - name: Run fallow audit
        run: cd frontend-svelt && npx fallow audit --base origin/main --format compact

  docker-build:
    needs: [backend-test, frontend-test, frontend-fallow, frontend-svelt-fallow, security-test-backend, dast-smoke]
    if: (needs.backend-test.result == 'success' && needs.frontend-test.result == 'success' && needs.frontend-fallow.result == 'success' && needs.frontend-svelt-fallow.result == 'success' && needs.dast-smoke.result == 'success') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache backend Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-backend
          key: ${{ runner.os }}-buildx-backend-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-backend-

      - name: Cache frontend Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-frontend
          key: ${{ runner.os }}-buildx-frontend-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-frontend-

      - name: Build backend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          cache-from: type=local,src=/tmp/.buildx-cache-backend
          cache-to: type=local,dest=/tmp/.buildx-cache-backend-new,mode=max

      - name: Move backend cache
        run: |
          rm -rf /tmp/.buildx-cache-backend
          mv /tmp/.buildx-cache-backend-new /tmp/.buildx-cache-backend

      - name: Build frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend-svelt
          push: false
          cache-from: type=local,src=/tmp/.buildx-cache-frontend
          cache-to: type=local,dest=/tmp/.buildx-cache-frontend-new,mode=max

      - name: Move frontend cache
        run: |
          rm -rf /tmp/.buildx-cache-frontend
          mv /tmp/.buildx-cache-frontend-new /tmp/.buildx-cache-frontend

  justfile-makefile-sync:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Makefile is in sync with justfile
        run: python scripts/just-to-make.py --check

  security-test-backend:
    needs: [backend-typecheck]
    if: needs.backend-typecheck.result == 'success' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install dependencies
        run: cd backend && uv sync --dev

      - name: Run security tests
        run: just security-test

  dast-smoke:
    needs: [backend-typecheck]
    if: needs.backend-typecheck.result == 'success' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Cache nuclei binary
        id: cache-nuclei
        uses: actions/cache@v4
        with:
          path: ~/go/bin/nuclei
          key: nuclei-v3-go

      - name: Install nuclei
        if: steps.cache-nuclei.outputs.cache-hit != 'true'
        run: go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest

      - name: Install dependencies
        run: cd backend && uv sync --dev

      - name: Start backend
        run: cd backend && uv run python -m app &
        env:
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"

      - name: Wait for backend
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080/api/health > /dev/null 2>&1; then
              echo "Backend is ready"
              exit 0
            fi
            echo "Waiting for backend... ($i/15)"
            sleep 2
          done
          echo "ERROR: Backend did not become ready in 30 seconds"
          exit 1

      - name: Run DAST smoke test
        run: ~/go/bin/nuclei -t .agent-workspace/quality-automation/nuclei-templates/ -u http://localhost:8080 -json -o nuclei-results.json

      - name: Check for HIGH/CRITICAL findings
        if: always()
        run: |
          if [ -f nuclei-results.json ]; then
            HIGH_CRIT=$(grep -c '"severity":"critical"\|"severity":"high"' nuclei-results.json 2>/dev/null || echo "0")
            if [ "$HIGH_CRIT" -gt 0 ]; then
              echo "::error::$HIGH_CRIT HIGH/CRITICAL DAST findings detected"
              exit 1
            fi
            echo "No HIGH/CRITICAL DAST findings"
          else
            echo "No nuclei results file — scan may have failed"
            exit 1
          fi
