name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lockfile-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Check Python lockfile
        run: cd backend && uv lock --check

      - name: Check JS lockfile
        run: cd frontend-svelt && bun install --frozen-lockfile

  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'justfile'
            frontend:
              - 'frontend-svelt/**'
              - 'justfile'

  backend-lint:
    needs: [lockfile-integrity, changes]
    if: needs.changes.outputs.backend == 'true' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install dependencies
        run: cd backend && uv sync --dev

      - name: Run backend lint
        run: just lint-backend

  backend-typecheck:
    needs: [lockfile-integrity, changes]
    if: needs.changes.outputs.backend == 'true' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install dependencies
        run: cd backend && uv sync --dev

      - name: Run backend typecheck
        run: just typecheck-backend

  backend-test:
    needs: [lockfile-integrity, changes]
    if: needs.changes.outputs.backend == 'true' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install dependencies
        run: cd backend && uv sync --dev

      - name: Run backend tests
        run: just test-backend

      - name: Annotate test failures
        if: failure()
        run: |
          if [ -f backend/coverage.xml ]; then
            echo "::group::Backend Test Results"
            echo "Tests failed — check logs above for details"
            echo "::endgroup::"
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          fail_ci_if_error: true

  frontend-lint:
    needs: [lockfile-integrity, changes]
    if: needs.changes.outputs.frontend == 'true' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Cache bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            frontend-svelt/node_modules/.cache
          key: bun-${{ hashFiles('frontend-svelt/bun.lock') }}
          restore-keys: |
            bun-

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install dependencies
        run: cd frontend-svelt && bun install --frozen-lockfile

      - name: Run frontend lint
        run: just lint-frontend

  frontend-typecheck:
    needs: [lockfile-integrity, changes]
    if: needs.changes.outputs.frontend == 'true' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Cache bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            frontend-svelt/node_modules/.cache
          key: bun-${{ hashFiles('frontend-svelt/bun.lock') }}
          restore-keys: |
            bun-

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install dependencies
        run: cd frontend-svelt && bun install --frozen-lockfile

      - name: Run frontend typecheck
        run: just typecheck-frontend

  frontend-test:
    needs: [lockfile-integrity, changes]
    if: needs.changes.outputs.frontend == 'true' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Cache bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            frontend-svelt/node_modules/.cache
          key: bun-${{ hashFiles('frontend-svelt/bun.lock') }}
          restore-keys: |
            bun-

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install dependencies
        run: cd frontend-svelt && bun install --frozen-lockfile

      - name: Run frontend tests
        run: just test-frontend

  docker-build:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache backend Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-backend
          key: ${{ runner.os }}-buildx-backend-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-backend-

      - name: Cache frontend Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-frontend
          key: ${{ runner.os }}-buildx-frontend-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-frontend-

      - name: Build backend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          cache-from: type=local,src=/tmp/.buildx-cache-backend
          cache-to: type=local,dest=/tmp/.buildx-cache-backend-new,mode=max

      - name: Move backend cache
        run: |
          rm -rf /tmp/.buildx-cache-backend
          mv /tmp/.buildx-cache-backend-new /tmp/.buildx-cache-backend

      - name: Build frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend-svelt
          push: false
          cache-from: type=local,src=/tmp/.buildx-cache-frontend
          cache-to: type=local,dest=/tmp/.buildx-cache-frontend-new,mode=max

      - name: Move frontend cache
        run: |
          rm -rf /tmp/.buildx-cache-frontend
          mv /tmp/.buildx-cache-frontend-new /tmp/.buildx-cache-frontend

  justfile-makefile-sync:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Makefile is in sync with justfile
        run: python scripts/just-to-make.py --check
