name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v4

      - name: Run ruff check
        run: uv run ruff check backend/

      - name: Run ruff format check
        run: uv run ruff format --check backend/

  backend-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v4

      - name: Run basedpyright
        run: uv run basedpyright backend/

  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v4

      - name: Run pytest with coverage
        run: uv run pytest backend/tests --cov=app --cov-report=xml
        working-directory: backend

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          fail_ci_if_error: true

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install
        working-directory: frontend-svelt

      - name: Run oxlint
        run: bun run oxlint
        working-directory: frontend-svelt

      - name: Run format check
        run: bun run format:check
        working-directory: frontend-svelt

  frontend-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install
        working-directory: frontend-svelt

      - name: Run svelte-check
        run: bun run check
        working-directory: frontend-svelt

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install
        working-directory: frontend-svelt

      - name: Run vitest
        run: bun run test
        working-directory: frontend-svelt

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t votecatcher-backend ./backend

      - name: Build frontend Docker image
        run: docker build -t votecatcher-frontend ./frontend-svelt
