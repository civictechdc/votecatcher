name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  generate-sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install syft
        run: curl -sfL https://raw.githubusercontent.com/anchore/syft/v1.42.3/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOMs
        run: just sbom

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.ref_name }}
          path: |
            sbom-backend.spdx.json
            sbom-frontend.spdx.json

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sbom-backend.spdx.json
            sbom-frontend.spdx.json
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  summarize-changelog:
    needs: generate-sbom
    runs-on: ubuntu-latest
    permissions:
      contents: write
      models: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install git-cliff
        run: curl -sfL https://github.com/orhun/git-cliff/releases/latest/download/git-cliff-linux-x86_64-unknown-linux-gnu.tar.gz | tar xz --strip-components=1 -C /usr/local/bin

      - name: Generate raw changelog
        run: git-cliff --config cliff.toml -o CHANGELOG.md

      - name: Summarize with GitHub Models
        run: bash scripts/changelog-summarize.sh CHANGELOG.md scripts/changelog-prompt.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGELOG_MODEL: ${{ vars.CHANGELOG_MODEL || 'deepseek/deepseek-v3-0324' }}
          CHANGELOG_MIN_COMMITS: ${{ vars.CHANGELOG_MIN_COMMITS || '6' }}

      - name: Commit summarized changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "docs: summarize changelog for ${{ github.ref_name }}"
          git push

  edge-functions-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Lint and type-check Edge Functions
        run: just edge-functions
